name: Spring Boot CI/CD DevSecOps - Julio Cyriaque MBETHEKE

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build, Test, Sonar & Nexus
    runs-on: ubuntu-latest

    services:
      # Conteneur éphémère SonarQube
      sonarqube:
        image: sonarqube:lts
        ports:
          - 9000:9000
      # Conteneur éphémère Nexus
      nexus:
        image: sonatype/nexus3:latest
        ports:
          - 8081:8081

    steps:
      # FLUX : Récupération du code sur le Runner
      - name: 01. Checkout repository
        uses: actions/checkout@v4

      - name: 02. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 03. Attente démarrage des serveurs (Healthcheck)
        run: |
          echo "Initialisation des conteneurs de l'infrastructure..."
          sleep 50

      # FLUX : Build Spring Boot (Maven)
      - name: 04. Build with Maven (Compile & Test)
        run: mvn clean verify

      # FLUX : Analyse SonarQube
      - name: 05. SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=springboot-app \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # FLUX : Push artefact JAR vers Nexus (Branche main uniquement)
      - name: 06. Publish binaire JAR to Nexus
        if: github.ref == 'refs/heads/main'
        run: mvn deploy -DskipTests
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      # Archivage intermédiaire du binaire pour le job suivant
      - name: 07. Upload JAR artifact for Docker Job
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  docker:
    name: Scan Trivy, Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build # Garantit la dépendance séquentielle entre les jobs
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 01. Checkout repository
        uses: actions/checkout@v4

      - name: 02. Download JAR artifact from Build Job
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: target

      # FLUX : Scanner de vulnérabilité Trivy (Analyse complète du système de fichiers)
      - name: 03. Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' # Permet de poursuivre le flux même si des failles sont détectées
          severity: 'CRITICAL,HIGH'

      # FLUX : Authentification Docker Hub
      - name: 04. Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FLUX : Build image Docker & Push image vers Docker Hub
      - name: 05. Build & Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest