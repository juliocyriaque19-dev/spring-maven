name: Spring Boot CI/CD DevSecOps - Julio Cyriaque MBETHEKE

on:
  push:
    branches: [ main, develop ][cite: 1]
  pull_request:
    branches: [ main, develop ][cite: 1]

jobs:
  devsecops-pipeline:
    name: Build, Scan & Deploy (Julio Cyriaque MBETHEKE)
    runs-on: ubuntu-latest[cite: 1]

    services:
      # Lancement automatique de SonarQube au cœur de la pipeline
      sonarqube:
        image: sonarqube:lts[cite: 1]
        ports:
          - 9000:9000[cite: 1]
      
      # Lancement automatique de Nexus au cœur de la pipeline
      nexus:
        image: sonatype/nexus3:latest[cite: 1]
        ports:
          - 8081:8081[cite: 1]

    steps:
      # 1. Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4[cite: 1]

      # 2. Configuration de l'environnement Java OpenJDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4[cite: 1]
        with:
          java-version: '17'[cite: 1]
          distribution: 'temurin'[cite: 1]
          cache: maven[cite: 1]

      # 3. Attente du démarrage complet des services (Healthcheck)
      - name: Wait for Services to be Ready
        run: |
          echo "Attente du démarrage de SonarQube et Nexus..."
          sleep 40

      # 4. Compilation et Tests de l'application Spring Boot via Maven
      - name: Build with Maven
        run: mvn clean verify[cite: 1]

      # 5. Analyse de la qualité du code avec SonarQube
      - name: SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=springboot-app-mbetheke \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 6. Publication de l'artéfact JAR vers Nexus (Uniquement sur la branche main)
      - name: Publish to Nexus
        if: github.ref == 'refs/heads/main'[cite: 1]
        run: mvn deploy -DskipTests[cite: 1]
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}[cite: 1]
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}[cite: 1]

      # 7. Archivage de sécurité du fichier JAR
      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main'[cite: 1]
        uses: actions/upload-artifact@v4[cite: 1]
        with:
          name: springboot-jar-mbetheke
          path: target/*.jar[cite: 1]

      # 8. Connexion à Docker Hub pour la livraison de l'image
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'[cite: 1]
        uses: docker/login-action@v3[cite: 1]
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}[cite: 1]
          password: ${{ secrets.DOCKERHUB_TOKEN }}[cite: 1]

      # 9. Build de l'image Docker sécurisée non-root et Push
      - name: Build & Push Docker image
        if: github.ref == 'refs/heads/main'[cite: 1]
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app-mbetheke:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app-mbetheke:latest