name: Spring Boot CI/CD DevSecOps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    name: Build, Test, Sonar & Nexus
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:lts
        ports:
          - 9000:9000
      nexus:
        image: sonatype/nexus3:latest
        ports:
          - 8081:8081
          - 8082:8082

    steps:
      - name: 01. Checkout repository
        uses: actions/checkout@v4

      - name: 02. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # CONFIGURATION COMPLÈTE DE NEXUS CONFORME À L'IMAGE DE L'EXAMEN
      - name: 03. Configuration automatique des dépôts Nexus (Maven & Docker)
        run: |
          echo "Attente du démarrage complet de Nexus..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:8081/); do
              printf '.'
              sleep 5
          done
          echo "Nexus est en ligne."
          
          NEXUS_PASS=$(docker exec nexus cat /nexus-data/admin.password)
          
          echo "1. Création du dépôt maven-hosted : spring-releases..."
          curl -u admin:$NEXUS_PASS -X POST "http://localhost:8081/service/rest/v1/repositories/maven/hosted" \
            -H "accept: application/json" -H "Content-Type: application/json" \
            -d '{"name": "spring-releases", "online": true, "storage": {"blobStoreName": "default", "strictContentTypeValidation": true}, "hosted": {"versionPolicy": "MIXED", "writePolicy": "ALLOW_ONCE"}}'

          echo "2. Création du dépôt docker-hosted (mis en avant sur l'image)..."
          curl -u admin:$NEXUS_PASS -X POST "http://localhost:8081/service/rest/v1/repositories/docker/hosted" \
            -H "accept: application/json" -H "Content-Type: application/json" \
            -d '{"name": "docker-hosted", "online": true, "storage": {"blobStoreName": "default", "strictContentTypeValidation": true}, "docker": {"v1Enabled": false, "forceBasicAuth": false, "httpPort": 8082}}'

          echo "3. Activation du Realm Sécurité Docker Bearer Token..."
          curl -u admin:$NEXUS_PASS -X PUT "http://localhost:8081/service/rest/v1/security/realms/active" \
            -H "accept: application/json" -H "Content-Type: application/json" \
            -d '["NexusAuthenticatingRealm", "NexusAuthorizingRealm", "DockerToken"]'

      - name: 04. Build with Maven (Compile & Test)
        run: mvn clean verify

      - name: 05. SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=springboot-app \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=admin \
            -Dsonar.password=admin

      # FLUX PUSH COMPLÈTEMENT CONFIGURÉ ET CONFORME
      - name: 06. Publish binaire JAR to Nexus (spring-releases)
        if: github.ref == 'refs/heads/main'
        run: mvn deploy -DskipTests
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}