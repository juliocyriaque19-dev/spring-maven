jobs:
  build:
    name: Build, Test, Sonar & Nexus
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:lts
        ports:
          - 9000:9000
      nexus:
        image: sonatype/nexus3:latest
        ports:
          - 8081:8081

    steps:
      - name: 01. Checkout repository
        uses: actions/checkout@v4

      - name: 02. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # CONFIGURATION COMPLÈTE DE NEXUS CONFORME À LA PAGE 1
      - name: 03. Configuration automatique des dépôts Nexus
        run: |
          echo "Attente du démarrage complet de Nexus..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:8081/); do
              printf '.'
              sleep 5
          done
          echo "Nexus est en ligne. Récupération du mot de passe admin initial..."
          
          # Extraction du mot de passe admin généré par le conteneur
          NEXUS_PASS=$(docker exec nexus cat /nexus-data/admin.password)
          
          echo "Création du dépôt maven-hosted : spring-releases..."
          curl -u admin:$NEXUS_PASS -X POST "http://localhost:8081/service/rest/v1/repositories/maven/hosted" \
            -H "accept: application/json" -H "Content-Type: application/json" \
            -d '{"name": "spring-releases", "online": true, "storage": {"blobStoreName": "default", "strictContentTypeValidation": true}, "hosted": {"versionPolicy": "MIXED", "writePolicy": "ALLOW_ONCE"}}'

          echo "Création du dépôt maven-proxy : Maven Central..."
          curl -u admin:$NEXUS_PASS -X POST "http://localhost:8081/service/rest/v1/repositories/maven/proxy" \
            -H "accept: application/json" -H "Content-Type: application/json" \
            -d '{"name": "Maven Central", "online": true, "storage": {"blobStoreName": "default", "strictContentTypeValidation": true}, "proxy": {"url": "https://repo1.maven.org/maven2/", "contentMaxAge": 1440, "metadataMaxAge": 1440}}'

          echo "Création du dépôt maven-group : maven-public..."
          curl -u admin:$NEXUS_PASS -X POST "http://localhost:8081/service/rest/v1/repositories/maven/group" \
            -H "accept: application/json" -H "Content-Type: application/json" \
            -d '{"name": "maven-public", "online": true, "storage": {"blobStoreName": "default", "strictContentTypeValidation": true}, "group": {"memberNames": ["spring-releases", "Maven Central"]}}'
          
          # Modification du mot de passe admin par défaut pour correspondre à notre secret d'examen
          curl -u admin:$NEXUS_PASS -X PUT "http://localhost:8081/service/rest/v1/security/users/admin/change-password" \
            -H "accept: application/json" -H "Content-Type: text/plain" \
            -d "${{ secrets.NEXUS_PASSWORD }}"

      - name: 04. Build with Maven (Compile & Test)
        run: mvn clean verify

      - name: 05. SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=springboot-app \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=admin \
            -Dsonar.password=admin

      # FLUX PUSH COMPLÈTEMENT CONFIGURÉ ET CONFORME
      - name: 06. Publish binaire JAR to Nexus (spring-releases)
        if: github.ref == 'refs/heads/main'
        run: mvn deploy -DskipTests
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}